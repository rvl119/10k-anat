const getP=(w,l)=>{const s=PLAN.find(x=>x.id===w);if(!s)return{d:0,t:0,p:0};const a=s.sessions.filter(x=>x.type!=="repos");const d=a.filter(x=>l[`${w}-${x.day}`]?.completed).length;return{d,t:a.length,p:a.length?Math.round(d/a.length*100):0};};
const getV=(w,l)=>{const s=PLAN.find(x=>x.id===w);if(!s)return 0;return s.sessions.reduce((a,x)=>{const g=l[`${w}-${x.day}`];return a+(g?.completed?(g.distance||x.dist):0);},0);};

  const[ok,setOk]=useState(false);

        <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.3) 30%, rgba(0,0,0,0.55) 60%, rgba(0,0,0,0.75) 100%)"}} />

            <div>
              <div style={{fontSize:11,fontWeight:600,letterSpacing:3,color:"rgba(255,255,255,0.8)",textTransform:"uppercase"}}>Objectif</div>
              <div style={{fontSize:36,fontWeight:700,letterSpacing:-0.5,lineHeight:1.1,marginTop:2}}>10K</div>

                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:isR?400:600,color:isR?"rgba(255,255,255,0.7)":"#fff",fontStyle:isR?"italic":"normal"}}>{s.title}</div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,0.8)",marginTop:2}}>{s.dur}{s.dist>0?` · ~${s.dist} km`:""}</div>

                    <div style={{color:"rgba(255,255,255,0.6)",fontSize:16,fontWeight:300,transform:isO?"rotate(90deg)":"none",transition:"transform .2s"}}>›</div>

                    <div style={{display:"inline-block",fontSize:10,fontWeight:600,letterSpacing:1,background:cfg.bg,color:cfg.color,padding:"3px 10px",borderRadius:20,marginBottom:14}}>{cfg.label.toUpperCase()}</div>

                <div style={{height:"100%",width:`${Math.min(100,getV(w.id,logs)/w.volume*100)}%`,background:"linear-gradient(90deg, rgba(255,255,255,0.25), rgba(255,255,255,0.65))",borderRadius:2,transition:"width .5s"}}/>
              </div>
            </div>)}
          </div>
        )}

        {tab==="stats"&&<ST logs={logs}/>}

              <button key={t.id} onClick={()=>setTab(t.id)} style={{background:tab===t.id?"rgba(255,255,255,0.15)":"rgba(255,255,255,0.06)",border:`1px solid ${tab===t.id?"rgba(255,255,255,0.3)":"rgba(255,255,255,0.12)"}`,borderRadius:24,cursor:"pointer",padding:"8px 18px",display:"flex",alignItems:"center",gap:6,transition:"all .2s",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>

function LF({session,onSubmit}){
  const[f,setF]=useState({time:"",distance:String(session.dist),feeling:3,notes:"",avgPace:"",avgHR:"",maxHR:"",cadence:"",elevation:"",calories:""});
  const[adv,setAdv]=useState(false);
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  return(
    <div>
      <div style={{fontSize:11,fontWeight:600,letterSpacing:2,color:"rgba(255,255,255,0.6)",marginBottom:10}}>LOGGER CETTE SÉANCE</div>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <div style={{flex:1}}><label style={LS}>TEMPS RÉEL</label><input type="text" placeholder="32'15" value={f.time} onChange={e=>u("time",e.target.value)} style={{...IS,fontFamily:FF}}/></div>
        <div style={{flex:1}}><label style={LS}>DISTANCE (KM)</label><input type="number" step="0.1" value={f.distance} onChange={e=>u("distance",e.target.value)} style={{...IS,fontFamily:FF}}/></div>
      </div>
      <label style={LS}>RESSENTI</label>
      <div style={{display:"flex",gap:5,marginBottom:10}}>
        {FEELS.map(fl=>(<button key={fl.value} onClick={()=>u("feeling",fl.value)} style={{flex:1,...GL,borderRadius:10,padding:"8px 2px",cursor:"pointer",background:f.feeling===fl.value?"rgba(255,255,255,0.08)":"transparent",borderColor:f.feeling===fl.value?"rgba(255,255,255,0.18)":"rgba(255,255,255,0.1)",display:"flex",flexDirection:"column",alignItems:"center",gap:2,transition:"all .15s"}}><span style={{fontSize:18}}>{fl.emoji}</span><span style={{fontSize:8,color:f.feeling===fl.value?"rgba(255,255,255,0.85)":"rgba(255,255,255,0.5)"}}>{fl.label}</span></button>))}
      </div>
      <button onClick={()=>setAdv(!adv)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:12,fontWeight:500,padding:"4px 0",marginBottom:8,display:"flex",alignItems:"center",gap:6,fontFamily:FF}}>
        <span style={{transform:adv?"rotate(90deg)":"none",transition:"transform .2s",fontSize:14}}>›</span>Stats montre
      </button>
      {adv&&(<div className="fu" style={{marginBottom:8}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {[["ALLURE MOY.","avgPace","text","5'41/km"],["FC MOYENNE","avgHR","number","174"],["FC MAX","maxHR","number","189"],["CADENCE","cadence","number","172"],["D+ (m)","elevation","number","85"],["CALORIES","calories","number","387"]].map(([lbl,k,t,ph])=>(
          <div key={k}><label style={LS}>{lbl}</label><input type={t} placeholder={ph} value={f[k]} onChange={e=>u(k,e.target.value)} style={{...IS,fontFamily:FF}}/></div>))}
      </div></div>)}
      <label style={LS}>NOTES</label>
      <textarea placeholder="Sensations, météo…" value={f.notes} onChange={e=>u("notes",e.target.value)} rows={2} style={{...IS,resize:"none",marginBottom:10,fontFamily:FF}}/>
      <button onClick={()=>onSubmit({time:f.time,distance:parseFloat(f.distance)||0,feeling:f.feeling,notes:f.notes,avgPace:f.avgPace,avgHR:f.avgHR?+f.avgHR:null,maxHR:f.maxHR?+f.maxHR:null,cadence:f.cadence?+f.cadence:null,elevation:f.elevation?+f.elevation:null,calories:f.calories?+f.calories:null})} style={{...GB,borderRadius:12,padding:13,cursor:"pointer",width:"100%",fontSize:14,fontWeight:600,letterSpacing:0.5,color:"#fff",transition:"all .15s",fontFamily:FF}} onMouseDown={e=>e.currentTarget.style.transform="scale(0.97)"} onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}>
        Valider ✓
      </button>
    </div>
  );
}

function LV({log,onClear}){
  const stats=[log.time&&{l:"Temps",v:log.time},log.distance&&{l:"Distance",v:`${log.distance} km`},log.avgPace&&{l:"Allure",v:log.avgPace},log.feeling&&{l:"Ressenti",v:FEELS.find(f=>f.value===log.feeling)?.emoji},log.avgHR&&{l:"FC moy",v:`${log.avgHR} bpm`},log.maxHR&&{l:"FC max",v:`${log.maxHR} bpm`},log.cadence&&{l:"Cadence",v:`${log.cadence} ppm`},log.elevation&&{l:"D+",v:`${log.elevation} m`},log.calories&&{l:"Calories",v:log.calories}].filter(Boolean);
  return(<div>
    <div style={{fontSize:11,fontWeight:600,letterSpacing:2,color:"rgba(92,201,138,0.6)",marginBottom:10}}>SÉANCE ENREGISTRÉE ✓</div>
    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
      {stats.map((s,i)=><div key={i} style={{...GL,borderRadius:10,padding:"8px 12px"}}><div style={{fontSize:9,color:"rgba(255,255,255,0.6)",letterSpacing:0.8,fontWeight:500}}>{s.l.toUpperCase()}</div><div style={{fontSize:15,fontWeight:600,marginTop:2}}>{s.v}</div></div>)}
    </div>
    {log.notes&&<div style={{fontSize:12,color:"rgba(255,255,255,0.55)",fontStyle:"italic",marginBottom:10}}>"{log.notes}"</div>}
    <button onClick={onClear} style={{background:"none",border:"1px solid rgba(255,100,100,0.15)",color:"rgba(255,100,100,0.5)",padding:"7px 14px",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:500,fontFamily:FF}}>Supprimer</button>
  </div>);
}

function ST({logs}){
  const ts=PLAN.reduce((a,w)=>a+w.sessions.filter(s=>s.type!=="repos").length,0);
  const ds=Object.values(logs).filter(l=>l.completed).length;
  const td=PLAN.reduce((a,w)=>a+w.volume,0);
  const ad=Object.values(logs).reduce((a,l)=>l.completed?a+(l.distance||0):a,0);
  const fl=Object.values(logs).filter(l=>l.feeling);
  const af=fl.length?(fl.reduce((a,l)=>a+l.feeling,0)/fl.length).toFixed(1):"—";
  const hrs=Object.values(logs).filter(l=>l.avgHR);
  const ah=hrs.length?Math.round(hrs.reduce((a,l)=>a+l.avgHR,0)/hrs.length):null;
  return(<div style={{padding:20}} className="fu">
    <div style={{fontSize:22,fontWeight:700,marginBottom:20}}>Progression</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:20}}>
      {[{l:"SÉANCES",v:`${ds}/${ts}`,s:`${ts>0?Math.round(ds/ts*100):0}%`},{l:"DISTANCE",v:`${ad.toFixed(1)}`,s:`/ ${td} km`},{l:"RESSENTI",v:af,s:af!=="—"?FEELS.find(f=>f.value===Math.round(parseFloat(af)))?.emoji||"":""},{l:"FC MOY.",v:ah?`${ah}`:"—",s:ah?"bpm":""}].map((x,i)=>(
        <div key={i} style={{...G,borderRadius:14,padding:16,animation:`fu .3s ease ${i*0.05}s both`}}>
          <div style={{fontSize:9,fontWeight:500,color:"rgba(255,255,255,0.65)",letterSpacing:1.5,marginBottom:8}}>{x.l}</div>
          <div style={{fontSize:26,fontWeight:700,lineHeight:1}}>{x.v}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.55)",marginTop:4}}>{x.s}</div>
        </div>))}
    </div>
    <div style={{fontSize:13,fontWeight:600,color:"rgba(255,255,255,0.6)",letterSpacing:1,marginBottom:12}}>PAR SEMAINE</div>
    {PLAN.map((pw,i)=>{const p=getP(pw.id,logs),va=getV(pw.id,logs);return(
      <div key={pw.id} style={{...GL,borderRadius:12,padding:"12px 14px",marginBottom:6,animation:`fu .3s ease ${i*0.03}s both`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:13,fontWeight:700}}>S{pw.id}</span><span style={{fontSize:12,color:"rgba(255,255,255,0.6)"}}>{pw.name}</span></div>
          <span style={{fontSize:12,fontWeight:600,color:p.p===100?"#5CC98A":"rgba(255,255,255,0.7)"}}>{p.p}%</span>
        </div>
        <div style={{height:3,background:"rgba(255,255,255,0.08)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${p.p}%`,background:p.p===100?"#5CC98A":"linear-gradient(90deg, rgba(255,255,255,0.15), rgba(255,255,255,0.45))",borderRadius:2}}/></div>
        <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginTop:4}}>{va.toFixed(1)} / {pw.volume} km</div>
      </div>);})}
  </div>);
}

function CT(){
  const[dl,setDl]=useState(false);
  const gen=()=>{
    const start=new Date(2026,2,31);const dm={2:0,3:1,4:2,5:3,6:4,0:5,1:6};
    let ics="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Run10K//FR\r\nCALSCALE:GREGORIAN\r\nX-WR-CALNAME:Plan 10K – 40min\r\nX-WR-TIMEZONE:Europe/Paris\r\n";
    PLAN.forEach(w=>{const wo=(w.id-1)*7;w.sessions.forEach(s=>{const d=new Date(start);d.setDate(start.getDate()+wo+dm[s.day]);const ds=d.toISOString().replace(/[-:]/g,"").split("T")[0];const c=TYPE_CONFIG[s.type];const ic=s.type==="repos"?"💤":s.type==="course"?"🏁":"🏃";ics+=`BEGIN:VEVENT\r\nDTSTART;VALUE=DATE:${ds}\r\nSUMMARY:${ic} ${s.title} (S${w.id})\r\nDESCRIPTION:${w.name} — ${s.detail.replace(/\n/g,"\\n")}\\nType: ${c.label}\\nDurée: ${s.dur}${s.dist>0?`\\nDistance: ~${s.dist} km`:""}\r\nCATEGORIES:${c.label}\r\nUID:r10k-s${w.id}-d${s.day}@plan\r\nEND:VEVENT\r\n`;});});
    ics+="END:VCALENDAR\r\n";const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([ics],{type:"text/calendar"}));a.download="plan-10k-40min.ics";a.click();setDl(true);setTimeout(()=>setDl(false),3000);
  };
  return(<div style={{padding:20}} className="fu">
    <div style={{fontSize:22,fontWeight:700,marginBottom:20}}>Calendrier</div>
    <div style={{...G,borderRadius:16,padding:"28px 20px",textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:12}}>📅</div>
      <div style={{fontSize:17,fontWeight:700,marginBottom:6}}>Exporter vers Apple Calendar</div>
      <p style={{fontSize:13,color:"rgba(255,255,255,0.6)",lineHeight:1.6,marginBottom:20}}>Télécharge le fichier .ics et ouvre-le sur ton iPhone.</p>
      <button onClick={gen} style={{...GB,borderRadius:12,padding:14,cursor:"pointer",width:"100%",fontSize:14,fontWeight:600,color:"#fff",background:dl?"rgba(92,201,138,0.15)":"transparent",borderColor:dl?"rgba(92,201,138,0.3)":"rgba(255,255,255,0.2)",transition:"all .3s",fontFamily:FF}}>{dl?"✓ Téléchargé":"Télécharger .ics"}</button>
    </div>
    <div style={{...G,borderRadius:16,padding:20,marginTop:10}}>
      <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.6)",letterSpacing:1.5,marginBottom:12}}>INSTRUCTIONS</div>
      {["Télécharge le fichier .ics","Ouvre-le depuis Safari ou Fichiers","Accepte « Ajouter les événements »","Retrouve tes séances dans Calendrier"].map((s,i)=>(
        <div key={i} style={{display:"flex",gap:12,alignItems:"center",marginBottom:10}}>
          <div style={{width:22,height:22,borderRadius:"50%",background:"transparent",border:"1px solid rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.7)",flexShrink:0}}>{i+1}</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.8)"}}>{s}</div>
        </div>))}
    </div>
    <div style={{...G,borderRadius:16,padding:20,marginTop:10}}>
      <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.6)",letterSpacing:1.5,marginBottom:12}}>LÉGENDE</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {Object.entries(TYPE_CONFIG).map(([k,c])=><div key={k} style={{display:"flex",alignItems:"center",gap:6,background:c.bg,borderRadius:20,padding:"4px 10px",border:`1px solid ${c.color}22`}}><div style={{width:7,height:7,borderRadius:"50%",background:c.color}}/><span style={{fontSize:11,color:c.color,fontWeight:500}}>{c.label}</span></div>)}
      </div>
    </div>
  </div>);
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
